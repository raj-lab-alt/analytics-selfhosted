<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realtime - Analytics</title>
<link rel="stylesheet" href="/assets/dashboard.css">
</head>
<body>
<nav class="nav">
  <a href="/">Overview</a>
  <a href="/realtime.html" class="active">Realtime</a>
  <a href="/heatmap.html">Heatmap</a>
  <a href="/map.html">Map</a>
  <a href="/sites.html">Sites</a>
  <a href="/login.html" class="logout">Logout</a>
</nav>
<main class="container">
  <div class="site-selector" style="margin-bottom:16px">
    <select id="siteSelect" onchange="changeSite(this.value)" class="input"></select>
  </div>
  <h1>Realtime Visitors</h1>
  <div class="stats-grid">
    <div class="stat-card highlight"><h3>Active Now</h3><p id="activeCount">0</p></div>
    <div class="stat-card"><h3>Today</h3><p id="todayCount">0</p></div>
  </div>
  <div class="card">
    <h2>Live Sessions</h2>
    <table id="sessionsTable">
      <thead><tr><th>Page</th><th>Referrer</th><th>Country</th><th>Last Ping</th></tr></thead>
      <tbody id="sessionsBody"></tbody>
    </table>
  </div>
</main>
<script>
let siteId = parseInt(localStorage.getItem('analytics_site_id')) || 1;
let ws;

function getToken() { return localStorage.getItem('token'); }
function api(path) { return fetch(path, { headers: { 'Authorization': 'Bearer ' + getToken() }}); }

async function loadSites() {
  const r = await api('/api/sites');
  if (!r.ok) return;
  const sites = await r.json();
  const sel = document.getElementById('siteSelect');
  sel.innerHTML = sites.map(s => `<option value="${s.id}" ${s.id == siteId ? 'selected' : ''}>${s.name} (${s.domain})</option>`).join('');
}

function changeSite(val) {
  siteId = parseInt(val);
  localStorage.setItem('analytics_site_id', siteId);
  connectWS();
  fetchSessions();
}

function connectWS() {
  if (ws) ws.close();
  ws = new WebSocket((location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/ws?site_id=' + siteId);
  ws.onmessage = function(e) {
    const data = JSON.parse(e.data);
    document.getElementById('activeCount').textContent = data.active;
  };
}

function fetchSessions() {
  api('/api/active-sessions?site_id=' + siteId)
    .then(r => r.json()).then(data => {
      document.getElementById('activeCount').textContent = data.total;
      document.getElementById('todayCount').textContent = data.total;
      document.getElementById('sessionsBody').innerHTML = data.sessions.map(s =>
        '<tr><td>' + esc(s.page) + '</td><td>' + esc(s.referrer) + '</td><td>' + esc(s.country) + '</td><td>' + new Date(s.last_ping).toLocaleTimeString() + '</td></tr>'
      ).join('');
    });
}

function esc(s) { return s || '-'; }
loadSites();
connectWS();
fetchSessions();
setInterval(fetchSessions, 10000);
</script>
</body>
</html>
