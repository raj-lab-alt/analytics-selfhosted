<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sites - Analytics</title>
<link rel="stylesheet" href="/assets/dashboard.css">
</head>
<body>
<nav class="nav">
  <a href="/">Overview</a>
  <a href="/realtime.html">Realtime</a>
  <a href="/heatmap.html">Heatmap</a>
  <a href="/map.html">Map</a>
  <a href="/sites.html" class="active">Sites</a>
  <a href="/login.html" class="logout">Logout</a>
</nav>
<main class="container">
  <h1>Sites</h1>
  <div class="card" style="margin-bottom:16px">
    <h2>Add Site</h2>
    <input type="text" id="siteName" class="input" placeholder="Site name" style="margin-right:8px">
    <input type="text" id="siteDomain" class="input" placeholder="domain.com" style="margin-right:8px">
    <button onclick="addSite()" class="btn">Add</button>
  </div>
  <div class="card">
    <h2>Your Sites</h2>
    <table>
      <thead><tr><th>ID</th><th>Name</th><th>Domain</th><th>API Key</th><th>Tracker Code</th></tr></thead>
      <tbody id="sitesBody"></tbody>
    </table>
  </div>
</main>
<script>
function getToken() { return localStorage.getItem('token'); }
function api(path, opts) {
  return fetch(path, { headers: { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json', ...opts?.headers }, ...opts });
}

async function loadSites() {
  const r = await api('/api/sites');
  if (!r.ok) { window.location = '/login.html'; return; }
  const sites = await r.json();
  document.getElementById('sitesBody').innerHTML = sites.map(s => `
    <tr>
      <td>${s.id}</td>
      <td>${esc(s.name)}</td>
      <td>${esc(s.domain)}</td>
      <td><code>${esc(s.api_key)}</code></td>
      <td><code>&lt;script src="https://analytics.curtexrm.com/tracker.js" data-site="${s.id}" data-api="https://analytics.curtexrm.com/collect" defer&gt;&lt;/script&gt;</code></td>
    </tr>
  `).join('');
}

async function addSite() {
  const name = document.getElementById('siteName').value.trim();
  const domain = document.getElementById('siteDomain').value.trim();
  if (!name || !domain) return alert('Fill all fields');
  const r = await api('/api/sites', { method: 'POST', body: JSON.stringify({ name, domain }) });
  if (!r.ok) { const e = await r.json(); alert(e.error); return; }
  document.getElementById('siteName').value = '';
  document.getElementById('siteDomain').value = '';
  loadSites();
}

function esc(s) { return s || '-'; }
loadSites();
</script>
</body>
</html>
