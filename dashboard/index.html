<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Dashboard</title>
<link rel="stylesheet" href="/assets/dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<nav class="nav">
  <a href="/">Overview</a>
  <a href="/realtime.html">Realtime</a>
  <a href="/heatmap.html">Heatmap</a>
  <a href="/sites.html">Sites</a>
  <a href="/login.html" class="logout">Logout</a>
</nav>
<main class="container">
  <div class="site-selector" style="margin-bottom:16px">
    <select id="siteSelect" onchange="changeSite(this.value)" class="input"></select>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><h3>Active</h3><p id="activeCount">0</p></div>
    <div class="stat-card"><h3>Today</h3><p id="todayViews">0</p></div>
    <div class="stat-card"><h3>7 Days</h3><p id="weekViews">0</p></div>
    <div class="stat-card"><h3>30 Days</h3><p id="monthViews">0</p></div>
  </div>
  <div class="chart-container">
    <div class="chart-controls">
      <button data-days="7" class="active">7 days</button>
      <button data-days="30">30 days</button>
      <button data-days="90">90 days</button>
    </div>
    <canvas id="overviewChart" height="300"></canvas>
  </div>
  <div class="row">
    <div class="card half"><h2>Top Pages</h2><div id="topPages"></div></div>
    <div class="card half"><h2>Top Sources</h2><div id="topSources"></div></div>
  </div>
</main>
<script src="/assets/dashboard.js"></script>
</body>
</html>
