<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Analytics</title>
<link rel="stylesheet" href="/assets/dashboard.css">
</head>
<body>
<main class="container" style="max-width:400px;margin-top:100px;">
  <div class="card">
    <h1>Analytics Login</h1>
    <input type="password" id="pwd" class="input" placeholder="Admin password" style="width:100%;margin:10px 0;">
    <button onclick="login()" class="btn" style="width:100%">Login</button>
    <p id="error" style="color:red;display:none;">Wrong password</p>
  </div>
</main>
<script>
function login() {
  const pwd = document.getElementById('pwd').value;
  localStorage.setItem('token', pwd);
  fetch('/api/overview', { headers: { 'Authorization': 'Bearer ' + pwd }})
    .then(r => { if (r.ok) window.location = '/'; else { document.getElementById('error').style.display = 'block'; localStorage.removeItem('token'); } });
}
document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
