<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<style>
.caisse-tabs { display:flex; gap:0; margin-bottom:16px; flex-wrap:wrap }
.caisse-tabs a { padding:8px 16px; border:1px solid #ddd; background:#f9f9f9; text-decoration:none; color:#333; font-size:13px; font-weight:500 }
.caisse-tabs a:first-child { border-radius:6px 0 0 6px }
.caisse-tabs a:last-child { border-radius:0 6px 6px 0 }
.caisse-tabs a.active { background:#4e73df; color:#fff; border-color:#4e73df }
.caisse-tabs a:not(.active):hover { background:#e8e8e8 }
.caisse-tabs a.tab-new-op { background:#fffbeb; border-color:#fde68a; font-weight:700 }
.caisse-tabs a.tab-new-op.active { background:#4e73df; color:#fff; border-color:#4e73df }
.caisse-tabs a.tab-paiements { background:#eff6ff; border-color:#bfdbfe }
.caisse-tabs a.tab-paiements.active { background:#4e73df; color:#fff; border-color:#4e73df }

.paiement-card { background:#f9fafb; border:1px solid #e5e7eb; border-radius:8px; padding:16px; margin-bottom:12px }
.paiement-card h3 { margin:0 0 12px; font-size:15px; color:#111827 }
.paiement-input { font-size:24px; font-weight:700; padding:12px 16px; border:2px solid #4e73df; border-radius:8px; width:100%; box-sizing:border-box; text-align:center; outline:none }
.paiement-input:focus { border-color:#2e59d9; box-shadow:0 0 0 3px rgba(78,115,223,0.15) }
.paiement-breakdown { margin-top:12px }
.paiement-row { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #e5e7eb; font-size:14px }
.paiement-row.total { font-weight:700; border-top:2px solid #4e73df; border-bottom:none; margin-top:4px; padding-top:8px; font-size:15px }
.paiement-msg { padding:10px 14px; border-radius:6px; margin-top:10px; font-size:13px; font-weight:600; display:none }
.paiement-msg.success { background:#d4edda; color:#155724; border:1px solid #c3e6cb; display:block }
.paiement-msg.error { background:#f8d7da; color:#721c24; border:1px solid #f5c6cb; display:block }

.caisse-form { display:grid; grid-template-columns:1fr 1fr; gap:8px 24px }
.caisse-form .full { grid-column:1/-1 }
.caisse-form label { display:block; font-size:12px; color:#666; margin-bottom:2px }

.amount-row { display:flex; gap:16px }
.amount-field { flex:1 }
.amount-field input { width:100%; box-sizing:border-box; font-size:18px; font-weight:700; padding:10px 12px; border:2px solid #ddd; border-radius:6px; outline:none }
.amount-field.in input { border-color:#1cc88a; background:#f0fff4 }
.amount-field.out input { border-color:#e74a3b; background:#fff5f5 }
.amount-field label { text-align:center; font-weight:600 }
.amount-field.in label { color:#1cc88a }
.amount-field.out label { color:#e74a3b }

.caisse-central-table { width:100% }
.caisse-central-table th { background:#4e73df; color:#fff; text-align:left }
.caisse-central-table td, .caisse-central-table th { padding:8px 12px }
.caisse-central-table .total-row { font-weight:700; border-top:2px solid #333 }
.caisse-central-table .clickable { cursor:pointer }
.caisse-central-table .clickable:hover { background:#f0f4ff }

.quota-preview { background:#f0fdf4; border:1px solid #bbf7d0; border-radius:8px; padding:12px; margin-top:8px }
.quota-preview h4 { margin:0 0 6px; font-size:13px; color:#166534 }
.quota-preview .qp-row { display:flex; justify-content:space-between; font-size:12px; padding:2px 0; border-bottom:1px dashed #dcfce7 }
.quota-preview .qp-row:last-child { border-bottom:none }
.quota-preview .qp-total { font-weight:700; border-top:2px solid #166534; margin-top:4px; padding-top:4px }

.quota-config-table { width:100% }
.quota-config-table th { background:#4e73df; color:#fff; text-align:left }
.quota-config-table td, .quota-config-table th { padding:8px 12px }
.quota-config-table input { width:80px; padding:4px 8px; border:1px solid #ddd; border-radius:4px; text-align:right }
.quota-config-table .warning { color:#e74a3b; font-weight:600 }

.chart-container canvas { max-height:200px }
.insights-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px }
.insights-grid .card { overflow:auto; max-height:300px }
.caisse-table-wrap { overflow-x:auto }
.caisse-table { width:100% }
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600 }
.badge-in { background:#d4edda; color:#155724 }
.badge-out { background:#f8d7da; color:#721c24 }
.pagination { margin-top:12px; display:flex; gap:4px; justify-content:center; flex-wrap:wrap }
.pagination a { padding:4px 10px; border:1px solid #ddd; border-radius:4px; text-decoration:none; color:#333 }
.pagination a.active { background:#4e73df; color:#fff; border-color:#4e73df }
.filters { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:12px }
@media(max-width:600px){ .caisse-form { grid-template-columns:1fr } .insights-grid { grid-template-columns:1fr } }
</style>
</head>

<main class="container">
  <h1>Gestion de caisse</h1>

  <!-- Onglets -->
  <div class="caisse-tabs" id="caisseTabs">
    <a href="#" data-caisse="new-op" class="active tab-new-op">+ Opération</a>
    <a href="#" data-caisse="paiements" class="tab-paiements">Paiements</a>
    <a href="#" data-caisse="">Centrale</a>
    <a href="#" data-caisse="recettes">Recettes</a>
    <a href="#" data-caisse="associes">Associés</a>
    <a href="#" data-caisse="media_buy">Media Buy</a>
    <a href="#" data-caisse="loyer_charges">Loyer & Charges</a>
    <a href="#" data-caisse="achats">Achats</a>
    <a href="#" data-caisse="config" style="font-weight:500">Configuration</a>
  </div>

  <!-- Contenu dynamique -->
  <div id="caisseContent"></div>

  <!-- Exports (hidden on form/config tabs) -->
  <div id="exportBar" style="margin-top:12px;display:none;gap:8px">
    <button class="btn btn-sm" onclick="downloadExport('csv')">Exporter CSV</button>
    <button class="btn btn-sm" onclick="downloadExport('pdf')">Exporter PDF</button>
  </div>
</main>

<script>
var CAISSES = ['recettes','associes','media_buy','loyer_charges','achats'];
var QUOTA_CAISSES = ['associes','media_buy','loyer_charges','achats'];
var CAISSE_LABELS = { recettes:'Recettes', associes:'Associés', media_buy:'Media Buy', loyer_charges:'Loyer & Charges', achats:'Achats' };
var currentTab = 'new-op', currentPage = 1, chart = null;

function getToken() { return localStorage.getItem('token'); }
function apiP(path, opts) {
  return fetch(path, { headers: { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json', ...opts?.headers }, ...opts });
}

function fmtFR(d) {
  if (!d) return '';
  var m = d.match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? m[3]+'/'+m[2]+'/'+m[1] : d;
}
function todayFR() {
  var d = new Date();
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
}
function qs() {
  var p = new URLSearchParams();
  if (currentTab && currentTab !== 'new-op' && currentTab !== 'config') p.set('caisse', currentTab);
  return p.toString();
}

// Tabs
document.querySelectorAll('.caisse-tabs a').forEach(function(a) {
  a.addEventListener('click', function(e) {
    e.preventDefault();
    document.querySelectorAll('.caisse-tabs a').forEach(function(x) { x.classList.remove('active'); });
    a.classList.add('active');
    currentTab = a.dataset.caisse;
    currentPage = 1;
    render();
  });
});

function render() {
  if (currentTab === 'new-op') renderNewOp();
  else if (currentTab === 'paiements') renderPaiements();
  else if (currentTab === 'config') renderConfig();
  else renderNormalView();
}

// --- New Operation Tab ---
function renderNewOp() {
  document.getElementById('exportBar').style.display = 'none';
  var html = '<div class="card"><h2>Nouvelle opération</h2>';
  html += '<form id="opForm" class="caisse-form">';
  html += '<input type="hidden" name="edit_id" id="editId" value="">';
  html += '<p><label>Date</label><input type="text" id="fDate" class="input" placeholder="jj/mm/aaaa" required></p>';
  html += '<p><label>Libellé <span style="color:#e74a3b">*</span></label><input type="text" id="fLibelle" class="input" placeholder="Description" required></p>';
  html += '<div class="full amount-row">';
  html += '<div class="amount-field out"><label>Dépense (Sortie)</label><input type="number" id="fAmountOut" step="0.001" min="0" placeholder="0.000"></div>';
  html += '<div class="amount-field in"><label>Recette (Entrée)</label><input type="number" id="fAmountIn" step="0.001" min="0" placeholder="0.000"></div>';
  html += '</div>';
  // Colis / livreurs (visible only for recette)
  html += '<div class="full" id="quotaFields" style="display:none">';
  html += '<div style="display:flex;gap:12px;margin-bottom:8px">';
  html += '<p style="flex:1"><label>Nombre de colis</label><input type="number" id="fColis" class="input" min="1" step="1" placeholder="0"></p>';
  html += '<p style="flex:1"><label>Nombre de livreurs / associés</label><input type="number" id="fLivreurs" class="input" min="1" step="1" placeholder="0"></p>';
  html += '</div>';
  html += '<p><label class="checkbox-label"><input type="checkbox" id="fAppliquerQuotas" checked> <span>Appliquer les quotas</span></label></p>';
  html += '<div id="quotaPreview" class="quota-preview" style="display:none"></div>';
  html += '</div>';
  html += '<p><label>Caisse auxiliaire</label><select id="fCaisse" class="input" required>';
  html += '<option value="recettes">Recettes</option><option value="associes">Associés</option><option value="media_buy">Media Buy</option><option value="loyer_charges">Loyer & Charges</option><option value="achats">Achats</option>';
  html += '</select></p>';
  html += '<p><label>Mode de paiement</label><input type="text" id="fPayment" class="input" maxlength="30"></p>';
  html += '<p><label>Référence</label><input type="text" id="fRef" class="input" maxlength="100"></p>';
  html += '<p class="full"><label>Note</label><textarea id="fNote" class="input" rows="2"></textarea></p>';
  html += '<p class="full"><button type="submit" class="btn btn-primary" id="formSubmit">Enregistrer</button>';
  html += '<button type="button" class="btn" id="formCancel" style="display:none" onclick="cancelEdit()">Annuler</button></p>';
  html += '</form></div>';
  document.getElementById('caisseContent').innerHTML = html;

  bindFormEvents();
  document.getElementById('fDate').value = todayFR();
  // Pre-fill colis and livreurs from config
  apiP('/api/caisse/config').then(function(r) { return r.json(); }).then(function(cfg) {
    var associes = (cfg.quotas || []).find(function(q) { return q.caisse === 'associes'; });
    if (associes) {
      var elColis = document.getElementById('fColis');
      if (elColis && associes.valeur3) elColis.value = parseInt(associes.valeur3) || 0;
      var elLiv = document.getElementById('fLivreurs');
      if (elLiv && associes.valeur2) elLiv.value = parseInt(associes.valeur2) || 0;
    }
  }).catch(function() {});
}

function bindFormEvents() {
  var amtIn = document.getElementById('fAmountIn');
  var amtOut = document.getElementById('fAmountOut');
  var colis = document.getElementById('fColis');
  var livreurs = document.getElementById('fLivreurs');
  var applyQ = document.getElementById('fAppliquerQuotas');

  amtIn.addEventListener('input', function() {
    if (this.value) amtOut.value = '';
    toggleQuotaFields();
    updateQuotaPreview();
  });
  amtOut.addEventListener('input', function() {
    if (this.value) amtIn.value = '';
    toggleQuotaFields();
    updateQuotaPreview();
  });
  colis.addEventListener('input', updateQuotaPreview);
  livreurs.addEventListener('input', updateQuotaPreview);
  applyQ.addEventListener('change', function() {
    var preview = document.getElementById('quotaPreview');
    preview.style.display = this.checked && document.getElementById('fAmountIn').value ? 'block' : 'none';
  });
  document.getElementById('opForm').addEventListener('submit', submitForm);
}

function toggleQuotaFields() {
  var isRecette = !!document.getElementById('fAmountIn').value;
  document.getElementById('quotaFields').style.display = isRecette ? 'block' : 'none';
}

function updateQuotaPreview() {
  var amtIn = parseFloat(document.getElementById('fAmountIn').value) || 0;
  var colis = parseInt(document.getElementById('fColis').value) || 0;
  var livreurs = parseInt(document.getElementById('fLivreurs').value) || 0;
  var preview = document.getElementById('quotaPreview');
  var applyQ = document.getElementById('fAppliquerQuotas');
  if (!amtIn || !applyQ.checked) { preview.style.display = 'none'; return; }

  apiP('/api/caisse/config').then(function(r) { return r.json(); }).then(function(cfg) {
    var qm = {};
    (cfg.quotas || []).forEach(function(q) { qm[q.caisse] = q; });
    var associesVal = 0;
    var associesQ = qm['associes'];
    if (associesQ && associesQ.type === 'formule' && colis && livreurs) {
      associesVal = colis * livreurs * parseFloat(associesQ.valeur);
    }
    var reste = amtIn - associesVal;
    if (reste < 0) reste = 0;
    var html = '<h4>Répartition automatique</h4>';
    html += '<div class="qp-row"><span>Recette brute</span><span><strong>' + amtIn.toFixed(3) + '</strong> TND</span></div>';
    if (associesVal > 0) {
      html += '<div class="qp-row"><span>Associés (' + colis + ' colis × ' + livreurs + ' associés × ' + parseFloat(associesQ.valeur) + ' DT)</span><span style="color:#e74a3b">-' + associesVal.toFixed(3) + '</span></div>';
    }
    html += '<div class="qp-row"><span>Reste à répartir</span><span>' + reste.toFixed(3) + ' TND</span></div>';
    var totalPct = 0;
    QUOTA_CAISSES.forEach(function(c) {
      if (c === 'associes') return;
      var q = qm[c];
      if (!q || q.type !== 'pourcentage') return;
      var pct = parseFloat(q.valeur) || 0;
      if (pct <= 0) return;
      totalPct += pct;
      var amt = reste * pct / 100;
      html += '<div class="qp-row"><span>' + (CAISSE_LABELS[c]||c) + ' (' + pct + '%)</span><span style="color:#e74a3b">-' + amt.toFixed(3) + '</span></div>';
    });
    var net = amtIn - associesVal;
    QUOTA_CAISSES.forEach(function(c) {
      if (c === 'associes') return;
      var q = qm[c];
      if (!q || q.type !== 'pourcentage') return;
      var pct = parseFloat(q.valeur) || 0;
      if (pct <= 0) return;
      net -= reste * pct / 100;
    });
    html += '<div class="qp-row qp-total"><span>Recette nette conservée</span><span>' + net.toFixed(3) + ' TND</span></div>';
    if (totalPct > 100) html += '<div style="color:#e74a3b;font-size:11px;margin-top:4px">⚠ Somme des % dépasse 100 %</div>';
    preview.innerHTML = html;
    preview.style.display = 'block';
  }).catch(function() { preview.style.display = 'none'; });
}

function submitForm(e) {
  e.preventDefault();
  var editId = document.getElementById('editId').value;
  var amtIn = parseFloat(document.getElementById('fAmountIn').value) || 0;
  var amtOut = parseFloat(document.getElementById('fAmountOut').value) || 0;
  if (!amtIn && !amtOut) { alert('Saisissez un montant en Recette ou en Dépense'); return; }
  if (amtIn && amtOut) { alert('Un seul montant à la fois (Recette OU Dépense)'); return; }
  var type = amtIn ? 'in' : 'out';
  var amount = amtIn || amtOut;
  var body = {
    operation_date: document.getElementById('fDate').value,
    libelle: document.getElementById('fLibelle').value,
    type: type,
    amount: amount,
    caisse: document.getElementById('fCaisse').value,
    payment_method: document.getElementById('fPayment').value,
    reference: document.getElementById('fRef').value,
    note: document.getElementById('fNote').value,
    appliquer_quotas: document.getElementById('fAppliquerQuotas') ? document.getElementById('fAppliquerQuotas').checked : false,
  };
  if (type === 'in') {
    body.colis = parseInt(document.getElementById('fColis').value) || 0;
    body.livreurs = parseInt(document.getElementById('fLivreurs').value) || 0;
  }
  var url = editId ? '/api/caisse/operations/' + editId : '/api/caisse/operations';
  var method = editId ? 'PUT' : 'POST';
  apiP(url, { method: method, body: JSON.stringify(body) }).then(function(r) {
    if (!r.ok) { r.json().then(function(e) { alert(e.error || 'Erreur'); }); return; }
    cancelEdit();
    alert('Opération enregistrée');
    document.getElementById('opForm').reset();
    document.getElementById('quotaFields').style.display = 'none';
    document.getElementById('quotaPreview').style.display = 'none';
    document.getElementById('fDate').value = todayFR();
  });
}

function cancelEdit() {
  document.getElementById('editId').value = '';
  document.getElementById('formSubmit').textContent = 'Enregistrer';
  document.getElementById('formCancel').style.display = 'none';
}

// --- Paiements Tab ---
function renderPaiements() {
  document.getElementById('exportBar').style.display = 'none';
  var html = '<div class="card">';
  html += '<h2>Encaisser un paiement</h2>';
  html += '<div class="paiement-card">';
  html += '<h3>Montant du paiement (TND)</h3>';
  html += '<input type="number" id="paiementMontant" class="paiement-input" step="0.001" min="0" placeholder="0.000">';
  html += '<div id="paiementBreakdown" class="paiement-breakdown"></div>';
  html += '<div id="paiementMsg" class="paiement-msg"></div>';
  html += '<p style="margin-top:12px"><button class="btn btn-primary" id="paiementBtn" onclick="validerPaiement()" disabled>Valider</button></p>';
  html += '</div></div>';
  document.getElementById('caisseContent').innerHTML = html;

  document.getElementById('paiementMontant').addEventListener('input', function() {
    var amt = parseFloat(this.value) || 0;
    document.getElementById('paiementBtn').disabled = amt <= 0;
    if (amt > 0) updatePaiementBreakdown(amt);
    else document.getElementById('paiementBreakdown').innerHTML = '';
    document.getElementById('paiementMsg').style.display = 'none';
  });
}

function updatePaiementBreakdown(amount) {
  apiP('/api/caisse/config').then(function(r) { return r.json(); }).then(function(cfg) {
    var qm = {};
    (cfg.quotas || []).forEach(function(q) { qm[q.caisse] = q; });
    var html = '<div style="margin-top:8px;font-size:13px;color:#666;font-weight:600">Répartition</div>';

    var associesQ = qm['associes'];
    var associesVal = 0;
    if (associesQ && associesQ.type === 'formule' && associesQ.valeur2) {
      var nbColis = parseInt(associesQ.valeur3) || 0;
      var nbAssocies = parseInt(associesQ.valeur2) || 0;
      var taux = parseFloat(associesQ.valeur) || 1;
      associesVal = nbColis * nbAssocies * taux;
      html += '<div class="paiement-row"><span>Associés (' + nbColis + ' colis × ' + nbAssocies + ' assoc. × ' + taux.toFixed(3) + ' DT)</span><span style="color:#e74a3b">-' + associesVal.toFixed(3) + '</span></div>';
    }
    var reste = amount - associesVal;
    if (reste < 0) reste = 0;
    html += '<div class="paiement-row"><span>Reste à répartir</span><span>' + reste.toFixed(3) + '</span></div>';

    var totalPct = 0;
    QUOTA_CAISSES.forEach(function(c) {
      if (c === 'associes') return;
      var q = qm[c];
      if (!q || q.type !== 'pourcentage') return;
      var pct = parseFloat(q.valeur) || 0;
      if (pct <= 0) return;
      totalPct += pct;
      var amt = reste * pct / 100;
      html += '<div class="paiement-row"><span>' + (CAISSE_LABELS[c]||c) + ' (' + pct + '%)</span><span style="color:#e74a3b">-' + amt.toFixed(3) + '</span></div>';
    });

    var net = amount - associesVal;
    QUOTA_CAISSES.forEach(function(c) {
      if (c === 'associes') return;
      var q = qm[c];
      if (!q || q.type !== 'pourcentage') return;
      var pct = parseFloat(q.valeur) || 0;
      if (pct <= 0) return;
      net -= reste * pct / 100;
    });
    html += '<div class="paiement-row total"><span>Recette nette</span><span>' + net.toFixed(3) + '</span></div>';
    if (totalPct > 100) html += '<div style="color:#e74a3b;font-size:11px;margin-top:4px">⚠ Somme des % dépasse 100 %</div>';

    document.getElementById('paiementBreakdown').innerHTML = html;
  }).catch(function() {});
}

function validerPaiement() {
  var amt = parseFloat(document.getElementById('paiementMontant').value) || 0;
  if (amt <= 0) return;
  var btn = document.getElementById('paiementBtn');
  var msg = document.getElementById('paiementMsg');
  btn.disabled = true;
  btn.textContent = 'Enregistrement...';

  var today = new Date();
  var dateStr = String(today.getDate()).padStart(2,'0')+'/'+String(today.getMonth()+1).padStart(2,'0')+'/'+today.getFullYear();

  apiP('/api/caisse/config').then(function(r) { return r.json(); }).then(function(cfg) {
    var qm = {};
    (cfg.quotas || []).forEach(function(q) { qm[q.caisse] = q; });
    var associesQ = qm['associes'];
    var colis = parseInt(associesQ && associesQ.valeur3) || 0;
    var livreurs = parseInt(associesQ && associesQ.valeur2) || 0;

    var body = {
      operation_date: dateStr,
      libelle: 'Encaissement paiement',
      type: 'in',
      amount: amt,
      caisse: 'recettes',
      colis: colis,
      livreurs: livreurs,
      appliquer_quotas: true,
    };

    return apiP('/api/caisse/operations', { method: 'POST', body: JSON.stringify(body) }).then(function(r) {
      if (!r.ok) return r.json().then(function(e) { throw new Error(e.error || 'Erreur'); });
      msg.className = 'paiement-msg success';
      msg.textContent = '✓ Paiement enregistré avec succès';
      document.getElementById('paiementMontant').value = '';
      document.getElementById('paiementBreakdown').innerHTML = '';
      btn.disabled = true;
    });
  }).catch(function(e) {
    msg.className = 'paiement-msg error';
    msg.textContent = '✗ Erreur : ' + (e.message || 'Échec de l\'enregistrement');
  }).finally(function() {
    btn.textContent = 'Valider';
  });
}

// --- Normal Tab View (Centrale / per-caisse) ---
function renderNormalView() {
  document.getElementById('exportBar').style.display = 'flex';
  var s = qs();
  var perPage = 20;
  var p = currentPage;

  if (currentTab === '') renderCentral();
  else renderCaisseView(currentTab, s, p, perPage);

  // Summary cards
  apiP('/api/caisse/summary?' + s).then(function(r) { return r.json(); }).then(function(sum) {
    var html = '<div class="stats-grid" style="margin-bottom:16px">';
    if (currentTab) {
      var c = sum.caisses[currentTab];
      if (c) {
        html += '<div class="stat-card highlight"><h3>Solde</h3><p style="font-size:24px">'+c.balance.toFixed(3)+'</p></div>';
        html += '<div class="stat-card"><h3>Entrées</h3><p style="color:#1cc88a;font-size:20px">'+c.in.toFixed(3)+'</p></div>';
        html += '<div class="stat-card"><h3>Sorties</h3><p style="color:#e74a3b;font-size:20px">'+c.out.toFixed(3)+'</p></div>';
      }
    } else {
      html += '<div class="stat-card highlight"><h3>Solde global</h3><p style="font-size:24px">'+sum.central.balance.toFixed(3)+'</p></div>';
      html += '<div class="stat-card"><h3>Total Entrées</h3><p style="color:#1cc88a;font-size:20px">'+sum.central.in.toFixed(3)+'</p></div>';
      html += '<div class="stat-card"><h3>Total Sorties</h3><p style="color:#e74a3b;font-size:20px">'+sum.central.out.toFixed(3)+'</p></div>';
    }
    html += '</div>';
    var el = document.getElementById('caisseContent');
    if (el) el.innerHTML = html + el.innerHTML;
  });
}

function renderCentral() {
  var html = '';
  html += '<div class="card" style="margin-bottom:16px"><h2>Centrale — Synthèse par caisse</h2>';
  html += '<table class="caisse-central-table"><thead><tr><th>Caisse</th><th>Entrées</th><th>Sorties</th><th>Solde</th></tr></thead><tbody id="centralRows"></tbody></table></div>';
  html += '<div class="card chart-container"><h2>Évolution du solde global</h2><canvas id="centralChart" height="180"></canvas></div>';
  html += '<div class="insights-grid"><div class="card"><h2>Journalier</h2><div id="dailyTable"></div></div>';
  html += '<div class="card"><h2>Mensuel</h2><div id="monthlyTable"></div></div></div>';
  html += '<div class="card"><h2>Toutes les opérations</h2><div class="caisse-table-wrap"><table class="caisse-table"><thead><tr><th>Date</th><th>Libellé</th><th>Caisse</th><th>Type</th><th>Montant</th><th>Actions</th></tr></thead><tbody id="opsBody"></tbody></table></div><div id="pagination" class="pagination"></div></div>';
  document.getElementById('caisseContent').innerHTML = html;

  apiP('/api/caisse/central').then(function(r) { return r.json(); }).then(function(d) {
    var rows = '';
    d.rows.forEach(function(r) {
      rows += '<tr class="clickable" onclick="switchTab(\''+r.caisse+'\')"><td><strong>'+esc(r.label)+'</strong></td><td>'+r.in.toFixed(3)+'</td><td>'+r.out.toFixed(3)+'</td><td><strong>'+r.balance.toFixed(3)+'</strong></td></tr>';
    });
    rows += '<tr class="total-row"><td><strong>Total</strong></td><td>'+d.central.in.toFixed(3)+'</td><td>'+d.central.out.toFixed(3)+'</td><td>'+d.central.balance.toFixed(3)+'</td></tr>';
    document.getElementById('centralRows').innerHTML = rows;
  });
  loadChart('centralChart', '/api/caisse/chart?days=30');
  apiP('/api/caisse/daily').then(function(r) { return r.json(); }).then(function(data) {
    var h = '<table><thead><tr><th>Date</th><th>Entrées</th><th>Sorties</th><th>Net</th></tr></thead><tbody>';
    if (!data.length) h += '<tr><td colspan="4" style="color:#888">Aucune donnée</td></tr>';
    else data.forEach(function(r) { h += '<tr><td>'+fmtFR(r.day)+'</td><td>'+r.in_total.toFixed(3)+'</td><td>'+r.out_total.toFixed(3)+'</td><td>'+(r.in_total-r.out_total).toFixed(3)+'</td></tr>'; });
    h += '</tbody></table>';
    document.getElementById('dailyTable').innerHTML = h;
  });
  apiP('/api/caisse/monthly').then(function(r) { return r.json(); }).then(function(data) {
    var h = '<table><thead><tr><th>Mois</th><th>Entrées</th><th>Sorties</th><th>Net</th></tr></thead><tbody>';
    if (!data.length) h += '<tr><td colspan="4" style="color:#888">Aucune donnée</td></tr>';
    else data.forEach(function(r) {
      var d = new Date(r.month+'-01T00:00:00');
      h += '<tr><td>'+d.toLocaleString('fr',{month:'short',year:'numeric'})+'</td><td>'+r.in_total.toFixed(3)+'</td><td>'+r.out_total.toFixed(3)+'</td><td>'+(r.in_total-r.out_total).toFixed(3)+'</td></tr>';
    });
    h += '</tbody></table>';
    document.getElementById('monthlyTable').innerHTML = h;
  });
  loadOps();
}

    else data.forEach(function(r) { h += '<tr><td>'+fmtFR(r.day)+'</td><td>'+r.in_total.toFixed(3)+'</td><td>'+r.out_total.toFixed(3)+'</td><td>'+(r.in_total-r.out_total).toFixed(3)+'</td></tr>'; });
    h += '</tbody></table>';
    document.getElementById('dailyTable2').innerHTML = h;
  });
  apiP('/api/caisse/monthly?caisse='+tab).then(function(r) { return r.json(); }).then(function(data) {
    var h = '<table><thead><tr><th>Mois</th><th>Entrées</th><th>Sorties</th><th>Net</th></tr></thead><tbody>';
    if (!data.length) h += '<tr><td colspan="4" style="color:#888">Aucune donnée</td></tr>';

      var d = new Date(r.month+'-01T00:00:00');

// --- Config Tab ---
function renderConfig() {
  document.getElementById('exportBar').style.display = 'none';
  var html = '<div class="card"><h2>Configuration des quotas</h2>';
  html += '<p style="font-size:13px;color:#666;margin-bottom:12px">Définissez comment les recettes sont réparties automatiquement sur les caisses auxiliaires.</p>';
  html += '<table class="quota-config-table"><thead><tr><th>Caisse</th><th>Type</th><th>Valeur</th><th>Description</th></tr></thead><tbody id="quotaConfigBody"></tbody></table>';
  html += '<div id="quotaTotalBar" style="margin-top:8px;font-size:13px;font-weight:600"></div>';
  html += '<p style="margin-top:12px"><button class="btn btn-primary" onclick="saveConfig()">Enregistrer la configuration</button></p></div>';
  document.getElementById('caisseContent').innerHTML = html;

  apiP('/api/caisse/config').then(function(r) { return r.json(); }).then(function(cfg) {
    var qm = {};
    (cfg.quotas || []).forEach(function(q) { qm[q.caisse] = q; });
    var rows = '';
    var totalPct = 0;
    QUOTA_CAISSES.forEach(function(c) {
      var q = qm[c] || { caisse: c, type: 'pourcentage', valeur: 0 };
      if (c === 'associes') {
        var val = parseFloat(q.valeur) || 1;
        var val2 = parseFloat(q.valeur2) || 2;
        var val3 = parseFloat(q.valeur3) || 0;
        rows += '<tr><td><strong>'+esc(CAISSE_LABELS[c]||c)+'</strong></td><td>Formule (colis × associés × taux)</td>';
        rows += '<td>Colis: <input type="number" id="qc_'+c+'_v3" class="input" step="1" min="1" value="'+val3+'" style="width:55px"> × ';
        rows += 'Associés: <input type="number" id="qc_'+c+'_v2" class="input" step="1" min="1" value="'+val2+'" style="width:55px"> × ';
        rows += 'Taux: <input type="number" id="qc_'+c+'" class="input" step="0.01" min="0" value="'+val.toFixed(2)+'" style="width:60px"> DT</td>';
        rows += '<td style="font-size:12px;color:#666">Valeurs par défaut (colis, associés, taux)</td></tr>';
      } else {
        var val = parseFloat(q.valeur) || 0;
        totalPct += val;
        rows += '<tr><td><strong>'+esc(CAISSE_LABELS[c]||c)+'</strong></td><td>Pourcentage du reste</td>';
        rows += '<td><input type="number" id="qc_'+c+'" class="input" step="0.01" min="0" max="100" value="'+val.toFixed(2)+'" style="width:80px"> %</td>';
        rows += '<td style="font-size:12px;color:#666">Appliqué après déduction associés</td></tr>';
      }
    });
    document.getElementById('quotaConfigBody').innerHTML = rows;
    updateTotalBar(totalPct);
    // Live total update
    QUOTA_CAISSES.forEach(function(c) {
      if (c === 'associes') return;
      var el = document.getElementById('qc_'+c);
      if (el) el.addEventListener('input', function() { updateTotalBarLive(); });
    });
  });
}

function updateTotalBar(pct) {
  var el = document.getElementById('quotaTotalBar');
  var warn = pct > 100 ? ' <span style="color:#e74a3b">⚠ Le total dépasse 100 %</span>' : '';
  el.innerHTML = 'Total des pourcentages : <strong>' + pct.toFixed(2) + '%</strong> / 100%' + warn;
}

function updateTotalBarLive() {
  var total = 0;
  QUOTA_CAISSES.forEach(function(c) {
    if (c === 'associes') return;
    var el = document.getElementById('qc_'+c);
    if (el) total += parseFloat(el.value) || 0;
  });
  updateTotalBar(Math.round(total * 100) / 100);
}

function saveConfig() {
  var updates = [];
  QUOTA_CAISSES.forEach(function(c) {
    var el = document.getElementById('qc_'+c);
    if (!el) return;
    var val = parseFloat(el.value) || 0;
    if (c === 'associes') {
      var el2 = document.getElementById('qc_'+c+'_v2');
      var el3 = document.getElementById('qc_'+c+'_v3');
      var val2 = parseInt(el2.value) || 0;
      var val3 = parseInt(el3.value) || 0;
      updates.push({ caisse: c, type: 'formule', valeur: val, valeur2: val2, valeur3: val3 });
    } else updates.push({ caisse: c, type: 'pourcentage', valeur: val });
  });
  apiP('/api/caisse/config', { method: 'PUT', body: JSON.stringify(updates) }).then(function(r) {
    if (!r.ok) { r.json().then(function(e) { alert(e.error || 'Erreur'); }); return; }
    alert('Configuration enregistrée');
    renderConfig();
  });
}

function loadChart(canvasId, url) {
  apiP(url).then(function(r) { return r.json(); }).then(function(data) {
    if (chart) chart.destroy();
    var ctx = document.getElementById(canvasId);
    if (!ctx) return;
    chart = new Chart(ctx.getContext('2d'), {
      type: 'line',
      data: {
        labels: data.map(function(p) { var d=p.date; return d ? d.slice(8,10)+'/'+d.slice(5,7) : ''; }),
        datasets: [{ label:'Solde', data:data.map(function(p){return p.balance}), borderColor:'#0f7b73', backgroundColor:'rgba(15,123,115,0.1)', fill:true, tension:0.3, pointRadius:2 }]
      },
      options: { responsive:true, scales:{y:{beginAtZero:false}}, plugins:{legend:{display:false}} }
    });
  });
}

function loadOps() {
  var s = qs();
  apiP('/api/caisse/operations?'+s+'&page='+currentPage+'&per_page=20').then(function(r) { return r.json(); }).then(function(ops) {
    apiP('/api/caisse/operations/count?'+s).then(function(r) { return r.json(); }).then(function(cd) {
      var total = cd.count || 0;
      var pages = Math.max(1, Math.ceil(total / 20));
      var h = '';
      if (!ops.length) h = '<tr><td colspan="6" style="color:#888;text-align:center">Aucune opération</td></tr>';
      else ops.forEach(function(o) {
        var isIn = o.type === 'in';
        h += '<tr class="'+(isIn?'in':'out')+'">';
        h += '<td>'+fmtFR(o.operation_date)+'</td><td>'+esc(o.libelle)+'</td><td>'+esc(CAISSE_LABELS[o.caisse]||o.caisse)+'</td>';
        h += '<td><span class="badge '+(isIn?'badge-in':'badge-out')+'">'+(isIn?'Entrée':'Sortie')+'</span></td>';
        h += '<td>'+Number(o.amount).toFixed(3)+'</td>';
        h += '<td class="actions"><a href="#" onclick="editOp('+o.id+');return false">✏️</a> <a href="#" onclick="deleteOp('+o.id+');return false">🗑️</a></td>';
        h += '</tr>';
      });
      document.getElementById('opsBody').innerHTML = h;
      var ph = '';
      for (var i=1;i<=pages;i++) ph += '<a href="#" class="'+(i===currentPage?'active':'')+'" onclick="switchPage('+i+');return false">'+i+'</a>';
      document.getElementById('pagination').innerHTML = ph;
    });
  });
}

function loadOpsFor(s, page, perPage, bodyId, pagId, tab) {
  s += '&caisse=' + tab;
  apiP('/api/caisse/operations?'+s+'&page='+page+'&per_page='+perPage).then(function(r) { return r.json(); }).then(function(ops) {
    apiP('/api/caisse/operations/count?'+s).then(function(r) { return r.json(); }).then(function(cd) {
      var total = cd.count || 0;
      var pages = Math.max(1, Math.ceil(total / perPage));
      var h = '';
      if (!ops.length) h = '<tr><td colspan="6" style="color:#888;text-align:center">Aucune opération</td></tr>';
      else ops.forEach(function(o) {
        var isIn = o.type === 'in';
        h += '<tr class="'+(isIn?'in':'out')+'">';
        h += '<td>'+fmtFR(o.operation_date)+'</td><td>'+esc(o.libelle)+'</td>';
        h += '<td><span class="badge '+(isIn?'badge-in':'badge-out')+'">'+(isIn?'Entrée':'Sortie')+'</span></td>';
        h += '<td>'+Number(o.amount).toFixed(3)+'</td><td>'+esc(o.payment_method)+'</td>';
        h += '<td class="actions"><a href="#" onclick="editOp('+o.id+');return false">✏️</a> <a href="#" onclick="deleteOp('+o.id+');return false">🗑️</a></td>';
        h += '</tr>';
      });
      document.getElementById(bodyId).innerHTML = h;
      var ph = '';
      for (var i=1;i<=pages;i++) ph += '<a href="#" class="'+(i===page?'active':'')+'" onclick="window._tmpPage='+i+';renderCaisseView(\''+tab+'\',\''+s+'\','+i+','+perPage+');return false">'+i+'</a>';
      document.getElementById(pagId).innerHTML = ph;
    });
  });
}

function editOp(id) {
  apiP('/api/caisse/operations?per_page=200').then(function(r) { return r.json(); }).then(function(ops) {
    var op = ops.find(function(o) { return o.id == id; });
    if (!op) return;
    // Switch to new-op tab
    switchTab('new-op');
    document.getElementById('editId').value = op.id;
    document.getElementById('formSubmit').textContent = 'Modifier';
    document.getElementById('formCancel').style.display = 'inline-block';
    document.getElementById('fDate').value = fmtFR(op.operation_date);
    document.getElementById('fLibelle').value = op.libelle || '';
    if (op.type === 'in') {
      document.getElementById('fAmountIn').value = op.amount;
      document.getElementById('fAmountOut').value = '';
    } else {
      document.getElementById('fAmountOut').value = op.amount;
      document.getElementById('fAmountIn').value = '';
    }
    document.getElementById('fCaisse').value = op.caisse || 'recettes';
    document.getElementById('fPayment').value = op.payment_method || '';
    document.getElementById('fRef').value = op.reference || '';
    document.getElementById('fNote').value = op.note || '';
    if (op.colis) document.getElementById('fColis').value = op.colis;
    if (op.livreurs) document.getElementById('fLivreurs').value = op.livreurs;
    toggleQuotaFields();
    updateQuotaPreview();
  });
}

function deleteOp(id) {
  if (!confirm('Supprimer cette opération ? Les écritures de quota liées seront aussi supprimées.')) return;
  apiP('/api/caisse/operations/' + id, { method: 'DELETE' }).then(function(r) { return r.json(); }).then(function() { if (currentTab !== 'new-op' && currentTab !== 'config') renderNormalView(); });
}

function switchTab(caisse) {
  document.querySelectorAll('.caisse-tabs a').forEach(function(a) {
    a.classList.toggle('active', a.dataset.caisse === caisse);
  });
  currentTab = caisse;
  currentPage = 1;
  render();
}

function switchPage(p) { currentPage = p; if (currentTab && currentTab !== 'new-op' && currentTab !== 'config') renderNormalView(); }

function setType(t) { window._filterType = t; renderCaisseView(currentTab, qs(), currentPage, 20); }
function applyDateFilter() { window._filterFrom = document.getElementById('fDateFrom').value; window._filterTo = document.getElementById('fDateTo').value; renderCaisseView(currentTab, qs(), currentPage, 20); }

function downloadExport(format) {
  var s = qs();
  if (window._filterType) s += '&type='+window._filterType;
  if (window._filterFrom) s += '&date_from='+window._filterFrom;
  if (window._filterTo) s += '&date_to='+window._filterTo;
  var url = '/api/caisse/export/' + format + '?' + s;
  fetch(url, { headers: { 'Authorization': 'Bearer ' + getToken() } }).then(function(r) {
    if (!r.ok) throw new Error('Export failed');
    return r.blob();
  }).then(function(blob) {
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'caisse-export-' + new Date().toISOString().slice(0,10) + '.' + format;
    a.click();
    URL.revokeObjectURL(a.href);
  }).catch(function(e) { alert('Erreur export: ' + e.message); });
}

function esc(s) { if (s==null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Init
render();
</script>
