<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heatmap - Analytics</title>
<link rel="stylesheet" href="/assets/dashboard.css">
<script src="/assets/heatmap.min.js"></script>
<style>
#heatmapWrap { width:100%; min-height:400px; border:1px solid #ccc; position:relative; background:#fafafa; overflow:hidden; }
#heatmapFrame { width:100%; height:100%; border:none; }
#heatmapOverlay { position:absolute; top:0; left:0; width:100%; height:100%; z-index:10; pointer-events:none; }
#heatmapCanvas { position:relative; width:100%; height:100%; }
#scrollCanvas { position:absolute; top:0; left:0; width:6px; z-index:5; pointer-events:none; }
.mode-btn { padding:6px 14px; border:1px solid #ddd; background:#fff; cursor:pointer; font-size:13px; border-radius:4px 0 0 4px; }
.mode-btn + .mode-btn { border-left:0; border-radius:0 4px 4px 0; }
.mode-btn.active { background:#4A90D9; color:#fff; border-color:#4A90D9; }
</style>
</head>
<body>
<nav class="nav">
  <a href="/">Overview</a>
  <a href="/realtime.html">Realtime</a>
  <a href="/heatmap.html" class="active">Heatmap</a>
  <a href="/map.html">Map</a>
  <a href="/sites.html">Sites</a>
  <a href="/login.html" class="logout">Logout</a>
</nav>
<main class="container">
  <div class="site-selector" style="margin-bottom:16px">
    <select id="siteSelect" onchange="changeSite(this.value)" class="input"></select>
  </div>
  <h1>Heatmap</h1>
  <div class="card" style="margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
    <label>Page :</label>
    <select id="pageSelect" onchange="loadData()" class="input" style="width:400px"></select>
    <span id="dataCount" style="color:#888;font-size:13px"></span>
    <span style="margin-left:auto"></span>
    <span id="modeGroup">
      <button class="mode-btn active" data-mode="heat" onclick="switchMode('heat')">Clics + Mouvements</button>
      <button class="mode-btn" data-mode="scroll" onclick="switchMode('scroll')">Profondeur scroll</button>
    </span>
  </div>
  <div id="heatmapWrap">
    <iframe id="heatmapFrame" sandbox="" loading="lazy"></iframe>
    <div id="heatmapOverlay"><div id="heatmapCanvas"></div><canvas id="scrollCanvas"></canvas></div>
    <div id="heatmapEmpty" style="display:none; padding:40px; text-align:center; color:#888;">Aucune donnée sur cette page.</div>
  </div>
  <p style="margin-top:6px;font-size:12px;color:#999">La page s'affiche via proxy. Les scripts ne sont pas exécutés (sandbox).</p>
</main>
<script>
let siteId = parseInt(localStorage.getItem('analytics_site_id')) || 1;
let currentMode = 'heat';
let lastData = null;

function getToken() { return localStorage.getItem('token'); }
function api(path) { return fetch(path, { headers: { 'Authorization': 'Bearer ' + getToken() }}).then(r => { if (r.status === 401) { localStorage.removeItem('token'); window.location.href = '/login.html'; } return r; }); }

async function loadSites() {
  const r = await api('/api/sites');
  if (!r.ok) return;
  const sites = await r.json();
  const sel = document.getElementById('siteSelect');
  sel.innerHTML = sites.map(s => `<option value="${s.id}" ${s.id == siteId ? 'selected' : ''}>${s.name} (${s.domain})</option>`).join('');
  await loadPages();
}

function changeSite(val) {
  siteId = parseInt(val);
  localStorage.setItem('analytics_site_id', siteId);
  loadPages();
}

async function loadPages() {
  const sel = document.getElementById('pageSelect');
  sel.innerHTML = '<option value="">Chargement...</option>';
  try {
    const r = await api('/api/top-pages?site_id=' + siteId + '&days=30');
    const pages = await r.json();
    const grouped = {};
    pages.forEach(p => {
      let key = p.page;
      try { const u = new URL(p.page); key = u.origin + u.pathname; } catch(e) {}
      if (!grouped[key]) grouped[key] = { page: key, vues: 0 };
      grouped[key].vues += p.vues;
    });
    sel.innerHTML = Object.values(grouped).map(p => '<option value="' + p.page.replace(/"/g, '&quot;') + '">' + p.page + ' (' + p.vues + ' vues)</option>').join('');
  } catch(e) {}
  loadData();
}

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  renderData();
}

function loadData() {
  const pageUrl = document.getElementById('pageSelect').value;
  if (!pageUrl) return;
  document.getElementById('heatmapFrame').src = '/page-preview?url=' + encodeURIComponent(pageUrl);
  document.getElementById('heatmapEmpty').style.display = 'none';
  const container = document.getElementById('heatmapCanvas');
  container.innerHTML = '';
  document.getElementById('dataCount').textContent = 'Chargement...';
  Promise.all([
    api('/api/heatmap?site_id=' + siteId + '&page=' + encodeURIComponent(pageUrl)).then(r => r.json()),
    api('/api/scroll-depth?site_id=' + siteId + '&page=' + encodeURIComponent(pageUrl)).then(r => r.json())
  ]).then(([heatData, scrollData]) => {
    lastData = { heat: heatData, scroll: scrollData };
    renderData();
  }).catch(e => console.error('load error:', e));
}

function renderData() {
  if (!lastData) return;
  const container = document.getElementById('heatmapCanvas');
  if (currentMode === 'heat') renderHeat(container, lastData.heat);
  else renderScroll(container, lastData.scroll);
}

function renderHeat(container, res) {
  const data = res.points || res;
  const pageH = res.pageHeight || 800;
  document.getElementById('dataCount').textContent = data.length + ' points';
  container.innerHTML = '';
  if (data.length === 0) { document.getElementById('heatmapEmpty').style.display = ''; return; }
  document.getElementById('heatmapEmpty').style.display = 'none';
  const wrap = document.getElementById('heatmapWrap');
  const overlay = document.getElementById('heatmapOverlay');
  const frame = document.getElementById('heatmapFrame');
  const w = container.offsetWidth || 1200;
  const h = Math.round(pageH * w / 1200);
  wrap.style.height = h + 'px';
  overlay.style.height = h + 'px';
  frame.style.height = h + 'px';
  container.style.height = h + 'px';
  var heat = h337.create({ container, radius: 20, blur: .85 });
  var max = 0;
  data.forEach(d => { if (d.count > max) max = d.count; });
  var points = data.map(d => ({ x: Math.round(d.x * w), y: Math.round(d.y * h), value: d.count }));
  heat.setData({ max: max || 1, data: points });
}

function renderScroll(container, res) {
  const rows = res.rows || [];
  const pageH = res.pageHeight || 800;
  document.getElementById('dataCount').textContent = (res.total || 0) + ' sessions';
  container.innerHTML = '';
  if (rows.length === 0) { document.getElementById('heatmapEmpty').style.display = ''; return; }
  document.getElementById('heatmapEmpty').style.display = 'none';
  const wrap = document.getElementById('heatmapWrap');
  const overlay = document.getElementById('heatmapOverlay');
  const frame = document.getElementById('heatmapFrame');
  const w = container.offsetWidth || 1200;
  const h = Math.round(pageH * w / 1200);
  wrap.style.height = h + 'px';
  overlay.style.height = h + 'px';
  frame.style.height = h + 'px';
  container.style.height = h + 'px';
  const canvas = document.getElementById('scrollCanvas');
  canvas.width = 80;
  canvas.height = h;
  canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  rows.forEach(r => {
    const y0 = Math.round(r.y * h);
    const y1 = Math.round((r.y + 50 / pageH) * h);
    const alpha = r.visibility;
    const R = Math.round(255 * (1 - alpha));
    const G = Math.round(255 * alpha);
    ctx.fillStyle = 'rgba(' + R + ',' + G + ',0,0.85)';
    ctx.fillRect(0, y0, 80, Math.max(1, y1 - y0));
  });
}
</script>
</body>
</html>
