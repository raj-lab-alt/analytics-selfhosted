<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heatmap - Analytics</title>
<link rel="stylesheet" href="/assets/dashboard.css">
<style>
#heatmapWrap { width:100%; min-height:400px; border:1px solid #ccc; position:relative; background:#fafafa; overflow:hidden; }
#heatmapFrame { width:100%; height:100%; border:none; }
#heatmapOverlay { position:absolute; top:0; left:0; width:100%; height:100%; z-index:10; pointer-events:none; }
#heatmapCanvas { position:relative; width:100%; height:100%; }
#scrollCanvas { position:absolute; top:0; left:0; width:6px; z-index:5; pointer-events:none; }
#modeBar { display:flex; gap:0; }
.mode-btn { padding:6px 14px; border:1px solid #ddd; background:#fff; cursor:pointer; font-size:13px; }
.mode-btn:first-child { border-radius:4px 0 0 4px; }
.mode-btn:last-child { border-radius:0 4px 4px 0; border-left:0; }
.mode-btn.active { background:#4A90D9; color:#fff; border-color:#4A90D9; }
.type-btn { padding:4px 10px; border:1px solid #ccc; background:#fff; cursor:pointer; font-size:12px; }
.type-btn:first-child { border-radius:4px 0 0 4px; }
.type-btn:last-child { border-radius:0 4px 4px 0; border-left:0; }
.type-btn.active { background:#36b9cc; color:#fff; border-color:#36b9cc; }
#legendBar { display:flex; align-items:center; gap:8px; margin-top:4px; font-size:11px; color:#888; }
#legendGrad { height:12px; border-radius:3px; border:1px solid #ddd; flex:1; }
.row.three { display:flex; gap:16px; }
.row.two { display:flex; gap:16px; }
.card.third { flex:1; min-width:0; }
.card.half { flex:1; min-width:0; }
table.compact { width:100%; border-collapse:collapse; font-size:12px; }
table.compact th { text-align:left; padding:4px 6px; border-bottom:1px solid #ddd; font-weight:600; color:#555; }
table.compact td { padding:4px 6px; border-bottom:1px solid #eee; }
@media(max-width:720px){.row.three,.row.two{flex-direction:column;}}
</style>
</head>
<body>
<nav class="nav">
  <a href="/">Overview</a>
  <a href="/realtime.html">Realtime</a>
  <a href="/heatmap.html" class="active">Heatmap</a>
  <a href="/map.html">Map</a>
  <a href="/sites.html">Sites</a>
  <a href="/login.html" class="logout">Logout</a>
</nav>
<main class="container">
  <div class="site-selector" style="margin-bottom:16px">
    <select id="siteSelect" onchange="changeSite(this.value)" class="input"></select>
  </div>
  <h1>Heatmap</h1>
  <div class="card" style="margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
    <label>Page :</label>
    <select id="pageSelect" onchange="loadData()" class="input" style="width:380px"></select>
    <span id="dataCount" style="color:#888;font-size:13px"></span>
    <span style="margin-left:auto"></span>
    <span id="typeBar">
      <button class="type-btn active" data-type="all" onclick="setFilter('all')">Tout</button>
      <button class="type-btn" data-type="click" onclick="setFilter('click')">Clics</button>
      <button class="type-btn" data-type="move" onclick="setFilter('move')">Mouv</button>
      <button class="type-btn" data-type="touch" onclick="setFilter('touch')">Touch</button>
    </span>
    <span id="modeBar">
      <button class="mode-btn active" data-mode="heat" onclick="switchMode('heat')">C+M</button>
      <button class="mode-btn" data-mode="scroll" onclick="switchMode('scroll')">Scroll</button>
    </span>
  </div>
  <div class="card" style="margin-bottom:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:8px 16px;">
    <label style="font-size:12px;color:#888;">Rayon:</label>
    <input type="range" id="radiusSlider" min="5" max="60" value="22" oninput="onRadiusChange(this.value)" style="flex:1;max-width:200px;">
    <span id="radiusVal" style="font-size:12px;color:#888;">22</span>
  </div>
  <div id="heatmapWrap">
    <iframe id="heatmapFrame" sandbox="" loading="lazy"></iframe>
    <div id="heatmapOverlay"><div id="heatmapCanvas"></div><canvas id="scrollCanvas"></canvas></div>
    <div id="heatmapEmpty" style="display:none; padding:40px; text-align:center; color:#888;">Aucune donnée sur cette page.</div>
  </div>
  <div id="legendBar">
    <span>Faible</span>
    <canvas id="legendGrad" width="400" height="12"></canvas>
    <span>Fort</span>
  </div>

  <div class="row three" style="margin-top:20px">
    <div class="card third"><h2>Résumé</h2>
      <div id="heatSummary">
        <p style="color:#888">Aucune donnée enrichie.</p>
      </div>
    </div>
    <div class="card third"><h2>CTA Performance</h2>
      <div id="ctaTable" style="font-size:13px">
        <p style="color:#888">Aucun CTA tracké.</p>
      </div>
    </div>
    <div class="card third"><h2>Formulaire</h2>
      <div id="formTable" style="font-size:13px">
        <p style="color:#888">Aucun event formulaire.</p>
      </div>
    </div>
  </div>

  <div class="row two" style="margin-top:16px">
    <div class="card half"><h2>Scroll Distribution</h2>
      <div id="scrollDist" style="font-size:13px">
        <p style="color:#888">Aucune donnée scroll.</p>
      </div>
    </div>
    <div class="card half"><h2>Zones à problème</h2>
      <div id="problemZones" style="font-size:13px">
        <p style="color:#888">Aucun clic problématique.</p>
      </div>
    </div>
  </div>
</main>
<script>
let siteId = parseInt(localStorage.getItem('analytics_site_id')) || 1;
let currentMode = 'heat';
let currentType = 'all';
let lastHeat = null, lastScroll = null;
let radiusFactor = 22;

function getToken() { return localStorage.getItem('token'); }
function api(path) { return fetch(path, { headers: { 'Authorization': 'Bearer ' + getToken() }}); }

async function loadSites() {
  const r = await api('/api/sites');
  if (!r.ok) { if (r.status === 401) window.location = '/login.html'; return; }
  const sites = await r.json();
  const sel = document.getElementById('siteSelect');
  sel.innerHTML = sites.map(s => `<option value="${s.id}" ${s.id == siteId ? 'selected' : ''}>${s.name}</option>`).join('');
  loadPages();
}

function changeSite(val) {
  siteId = parseInt(val);
  localStorage.setItem('analytics_site_id', siteId);
  loadPages();
}

async function loadPages() {
  const sel = document.getElementById('pageSelect');
  sel.innerHTML = '<option value="">Chargement...</option>';
  try {
    const r = await api('/api/top-pages?site_id=' + siteId + '&days=30');
    const pages = await r.json();
    if (!pages || pages.length === 0) { sel.innerHTML = ''; loadData(); return; }
    const grouped = {};
    pages.forEach(p => {
      try { const u = new URL(p.page); p.page = u.origin + u.pathname; } catch(e) {}
      grouped[p.page] = (grouped[p.page] || 0) + p.vues;
    });
    sel.innerHTML = Object.entries(grouped).map(([url, vues]) => '<option value="' + url.replace(/"/g, '&quot;') + '">' + url + ' (' + vues + ' vues)</option>').join('');
  } catch(e) { console.error('loadPages error:', e); }
  loadData();
}

function setFilter(type) {
  currentType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === type));
  if (currentMode === 'heat') loadData();
}

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  renderData();
}

function onRadiusChange(val) {
  radiusFactor = parseInt(val);
  document.getElementById('radiusVal').textContent = radiusFactor;
  if (currentMode === 'heat' && lastHeat) renderHeat(lastHeat);
}

function loadData() {
  const pageUrl = document.getElementById('pageSelect').value;
  if (!pageUrl) return;
  document.getElementById('heatmapFrame').src = '/page-preview?url=' + encodeURIComponent(pageUrl);
  document.getElementById('heatmapEmpty').style.display = 'none';
  document.getElementById('dataCount').textContent = 'Chargement...';
  var typeParam = currentType === 'all' ? '' : '&type=' + currentType;
  api('/api/heatmap?site_id=' + siteId + '&page=' + encodeURIComponent(pageUrl) + typeParam).then(r => r.json()).then(d => {
    lastHeat = d; if (currentMode === 'heat') renderData();
  }).catch(e => console.error('heatmap API error:', e));
  api('/api/scroll-depth?site_id=' + siteId + '&page=' + encodeURIComponent(pageUrl)).then(r => r.json()).then(d => {
    lastScroll = d; if (currentMode === 'scroll') renderData();
  }).catch(e => console.error('scroll API error:', e));
  loadEnrichment(pageUrl);
}

async function loadEnrichment(pageUrl) {
  const enc = encodeURIComponent(pageUrl);
  const base = '/api/heatmaps';
  const sid = siteId;
  try {
    const [sum, ctas, forms, dead, rage, scrollDist] = await Promise.all([
      api(`${base}/summary?site_id=${sid}&page=${enc}`).then(r => r.json()),
      api(`${base}/ctas?site_id=${sid}&page=${enc}`).then(r => r.json()),
      api(`${base}/forms?site_id=${sid}&page=${enc}`).then(r => r.json()),
      api(`${base}/dead-clicks?site_id=${sid}&page=${enc}`).then(r => r.json()),
      api(`${base}/rage-clicks?site_id=${sid}&page=${enc}`).then(r => r.json()),
      api(`${base}/scroll-distribution?site_id=${sid}&page=${enc}`).then(r => r.json()),
    ]);
    renderSummary(sum);
    renderCtas(ctas);
    renderForms(forms);
    renderDeadRage(dead, rage);
    renderScrollDist(scrollDist);
    lastDead = dead; lastRage = rage;
    if (currentMode === 'heat') drawOverlay();
  } catch(e) { console.error('loadEnrichment error:', e); }
}

let lastDead = null, lastRage = null;

function renderSummary(sum) {
  const el = document.getElementById('heatSummary');
  el.innerHTML = '<table class="compact">' +
    '<tr><td>Sessions avec scroll</td><td><b>' + (sum.scroll_sessions || 0) + '</b></td></tr>' +
    '<tr><td>Clics totaux</td><td><b>' + (sum.total_clicks || 0) + '</b></td></tr>' +
    '<tr><td>Clics CTA</td><td><b>' + (sum.cta_clicks || 0) + '</b> <small>(CTR ' + (sum.cta_ctr || 0) + ')</small></td></tr>' +
    '<tr><td>Dead clicks</td><td><b>' + (sum.dead_clicks || 0) + '</b></td></tr>' +
    '<tr><td>Rage clicks</td><td><b>' + (sum.rage_clicks || 0) + '</b></td></tr>' +
    '<tr><td>Events formulaire</td><td><b>' + (sum.form_events || 0) + '</b></td></tr>' +
    '</table>';
}

function renderCtas(ctas) {
  const el = document.getElementById('ctaTable');
  if (!ctas || ctas.length === 0) { el.innerHTML = '<p style="color:#888">Aucun CTA tracké.</p>'; return; }
  el.innerHTML = '<table class="compact sortable"><thead><tr><th>CTA</th><th>Clics</th><th>Sessions</th><th>CTR</th></tr></thead><tbody>' +
    ctas.map(c => '<tr><td>' + esc(c.cta_name) + '</td><td>' + c.clicks + '</td><td>' + c.sessions + '</td><td>' + c.ctr + '</td></tr>').join('') +
    '</tbody></table>';
}

function renderForms(forms) {
  const el = document.getElementById('formTable');
  if (!forms || forms.length === 0) { el.innerHTML = '<p style="color:#888">Aucun event formulaire.</p>'; return; }
  el.innerHTML = '<table class="compact sortable"><thead><tr><th>Formulaire</th><th>Event</th><th>Count</th></tr></thead><tbody>' +
    forms.map(f => '<tr><td>' + esc(f.form_name) + '</td><td>' + esc(f.event_name) + '</td><td>' + f.count + '</td></tr>').join('') +
    '</tbody></table>';
}

function renderDeadRage(dead, rage) {
  const el = document.getElementById('problemZones');
  let html = '';
  if (dead && dead.zones && dead.zones.length > 0) {
    html += '<h4 style="margin:0 0 4px;color:#888">Dead Clicks</h4><table class="compact"><thead><tr><th>Zone</th><th>Clics</th><th>Sessions</th></tr></thead><tbody>';
    dead.zones.slice(0, 10).forEach(z => html += '<tr><td>' + z.x_bucket + '%,' + z.y_bucket + '%</td><td>' + z.count + '</td><td>' + z.sessions + '</td></tr>');
    html += '</tbody></table>';
  }
  if (rage && rage.zones && rage.zones.length > 0) {
    html += '<h4 style="margin:8px 0 4px;color:#888">Rage Clicks</h4><table class="compact"><thead><tr><th>Zone</th><th>Clics</th><th>Sessions</th></tr></thead><tbody>';
    rage.zones.slice(0, 10).forEach(z => html += '<tr><td>' + z.x_bucket + '%,' + z.y_bucket + '%</td><td>' + z.count + '</td><td>' + z.sessions + '</td></tr>');
    html += '</tbody></table>';
  }
  if (!html) html = '<p style="color:#888">Aucun clic problématique.</p>';
  el.innerHTML = html;
}

function renderScrollDist(dist) {
  const el = document.getElementById('scrollDist');
  if (!dist || !dist.depth || dist.depth.length === 0) { el.innerHTML = '<p style="color:#888">Aucune donnée scroll.</p>'; return; }
  el.innerHTML = '<table class="compact sortable"><thead><tr><th>Profondeur</th><th>Visiteurs</th><th>%</th></tr></thead><tbody>' +
    dist.depth.map(d => '<tr><td>' + d.range + '%</td><td>' + d.visitors + '</td><td>' + d.visitorsPercent + '%</td></tr>').join('') +
    '</tbody></table>' +
    '<p style="font-size:11px;color:#888;margin:4px 0 0">Sessions totales: ' + (dist.sessions || 0) + '</p>';
}

function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function drawOverlay() {
  // Draw dead click zones as gray circles, rage click zones as red circles on a separate canvas
  var wrap = document.getElementById('heatmapWrap');
  var w = document.getElementById('heatmapCanvas').offsetWidth || 1200;
  var h = wrap.offsetHeight;
  var canvas = document.getElementById('deadRageCanvas');
  if (!canvas) {
    canvas = document.createElement('canvas');
    canvas.id = 'deadRageCanvas';
    canvas.style.position = 'absolute';
    canvas.style.top = '0';
    canvas.style.left = '0';
    canvas.style.pointerEvents = 'none';
    canvas.style.zIndex = '20';
    document.getElementById('heatmapOverlay').appendChild(canvas);
  }
  canvas.width = w; canvas.height = h;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, w, h);
  if (lastDead && lastDead.zones) {
    lastDead.zones.forEach(function(z) {
      var cx = (z.x_bucket + 2.5) / 100 * w;
      var cy = (z.y_bucket + 2.5) / 100 * h;
      var r = Math.min(12, 4 + Math.log(z.count + 1) * 3);
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(128,128,128,0.5)'; ctx.fill();
      ctx.strokeStyle = 'rgba(80,80,80,0.8)'; ctx.lineWidth = 1; ctx.stroke();
    });
  }
  if (lastRage && lastRage.zones) {
    lastRage.zones.forEach(function(z) {
      var cx = (z.x_bucket + 2.5) / 100 * w;
      var cy = (z.y_bucket + 2.5) / 100 * h;
      var r = Math.min(12, 4 + Math.log(z.count + 1) * 3);
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(220,50,50,0.6)'; ctx.fill();
      ctx.strokeStyle = 'rgba(180,20,20,0.9)'; ctx.lineWidth = 2; ctx.stroke();
    });
  }
}

function renderData() {
  if (currentMode === 'heat' && lastHeat) { renderHeat(lastHeat); drawOverlay(); }
  else if (currentMode === 'scroll' && lastScroll) renderScroll(lastScroll);
}

function renderHeat(res) {
  try {
    var data = res.points || res;
    var pageH = res.pageHeight || 800;
    document.getElementById('dataCount').textContent = data.length + ' points';
    const container = document.getElementById('heatmapCanvas');
    container.innerHTML = '';
    if (data.length === 0) { document.getElementById('heatmapEmpty').style.display = ''; return; }
    document.getElementById('heatmapEmpty').style.display = 'none';
    const wrap = document.getElementById('heatmapWrap');
    const overlay = document.getElementById('heatmapOverlay');
    const frame = document.getElementById('heatmapFrame');
    const w = container.offsetWidth || 1200;
    const h = Math.round(pageH * w / 1200);
    wrap.style.height = h + 'px';
    overlay.style.height = h + 'px';
    frame.style.height = h + 'px';
    container.style.height = h + 'px';
    void container.offsetHeight;
    var max = 0;
    data.forEach(function(d) { if (d.count > max) max = d.count; });
    max = max || 1;
    var canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    canvas.style.position = 'absolute';
    canvas.style.top = '0';
    canvas.style.left = '0';
    container.appendChild(canvas);
    var ctx = canvas.getContext('2d');
    ctx.globalCompositeOperation = 'lighter';
    var radius = Math.max(5, w * radiusFactor / 1000);
    var maxLog = Math.log(max + 1);
    data.forEach(function(d) {
      var cx = d.x * w, cy = d.y * h;
      var t = Math.log(d.count + 1) / maxLog;
      var alpha = Math.min(0.85, 0.4 + t * 0.5);
      var r, g, b;
      if (t < 0.25) { r = 0; g = Math.round(255 * t * 4); b = 255; }
      else if (t < 0.5) { r = 0; g = 255; b = Math.round(255 * (1 - (t - 0.25) * 4)); }
      else if (t < 0.75) { r = Math.round(255 * (t - 0.5) * 4); g = 255; b = 0; }
      else { r = 255; g = Math.round(255 * (1 - (t - 0.75) * 4)); b = 0; }
      var grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
      grad.addColorStop(0, 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')');
      grad.addColorStop(0.35, 'rgba(' + r + ',' + g + ',' + b + ',0.25)');
      grad.addColorStop(1, 'rgba(' + r + ',' + g + ',' + b + ',0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.fill();
    });
  } catch(e) { console.error('renderHeat error:', e); document.getElementById('dataCount').textContent = 'Erreur: ' + e.message; }
}

function renderScroll(res) {
  const rows = res.rows || [];
  const pageH = res.pageHeight || 800;
  document.getElementById('dataCount').textContent = (res.total || 0) + ' sessions';
  const container = document.getElementById('heatmapCanvas');
  container.innerHTML = '';
  if (rows.length === 0) { document.getElementById('heatmapEmpty').style.display = ''; return; }
  document.getElementById('heatmapEmpty').style.display = 'none';
  const wrap = document.getElementById('heatmapWrap');
  const overlay = document.getElementById('heatmapOverlay');
  const frame = document.getElementById('heatmapFrame');
  const w = container.offsetWidth || 1200;
  const h = Math.round(pageH * w / 1200);
  wrap.style.height = h + 'px';
  overlay.style.height = h + 'px';
  frame.style.height = h + 'px';
  container.style.height = h + 'px';
  const canvas = document.getElementById('scrollCanvas');
  canvas.width = 80; canvas.height = h; canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  rows.forEach(r => {
    const y0 = Math.round(r.y * h);
    const y1 = Math.round((r.y + 50 / pageH) * h);
    const a = r.visibility;
    ctx.fillStyle = 'rgba(' + Math.round(255*(1-a)) + ',' + Math.round(255*a) + ',0,0.85)';
    ctx.fillRect(0, y0, 80, Math.max(1, y1 - y0));
  });
}

// Draw color legend
(function drawLegend() {
  var c = document.getElementById('legendGrad');
  var ctx = c.getContext('2d');
  for (var i = 0; i < c.width; i++) {
    var t = i / c.width;
    var r, g, b;
    if (t < 0.25) { r = 0; g = Math.round(255 * t * 4); b = 255; }
    else if (t < 0.5) { r = 0; g = 255; b = Math.round(255 * (1 - (t - 0.25) * 4)); }
    else if (t < 0.75) { r = Math.round(255 * (t - 0.5) * 4); g = 255; b = 0; }
    else { r = 255; g = Math.round(255 * (1 - (t - 0.75) * 4)); b = 0; }
    ctx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
    ctx.fillRect(i, 0, 1, c.height);
  }
})();

loadSites();
</script>
</body>
</html>
