<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map - Analytics</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="/assets/dashboard.css">
<style>
#map { height: calc(100vh - 120px); border-radius: 8px; margin-top: 12px; }
.marker-cluster { background: rgba(78,115,223,.2); border-radius: 50%; text-align: center; line-height: 40px; font-weight: bold; color: #4e73df; }
.leaflet-popup-content { margin: 8px 12px; font-size: 13px; }
.leaflet-popup-content strong { display: block; font-size: 15px; margin-bottom: 4px; }
</style>
</head>
<body>
<nav class="nav">
  <a href="/">Overview</a>
  <a href="/realtime.html">Realtime</a>
  <a href="/heatmap.html">Heatmap</a>
  <a href="/map.html" class="active">Map</a>
  <a href="/sites.html">Sites</a>
  <a href="/login.html" class="logout">Logout</a>
</nav>
<main class="container">
  <div class="site-selector" style="margin-bottom:8px">
    <select id="siteSelect" onchange="changeSite(this.value)" class="input"></select>
    <span id="visitorCount" style="margin-left:12px;font-size:14px;color:#666"></span>
  </div>
  <div id="map"></div>
</main>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let siteId = parseInt(localStorage.getItem('analytics_site_id')) || 1;
let map, markers;

function getToken() { return localStorage.getItem('token'); }
function api(path) { return fetch(path, { headers: { 'Authorization': 'Bearer ' + getToken() }}); }

async function loadSites() {
  const r = await api('/api/sites');
  if (!r.ok) return;
  const sites = await r.json();
  const sel = document.getElementById('siteSelect');
  sel.innerHTML = sites.map(s => `<option value="${s.id}" ${s.id == siteId ? 'selected' : ''}>${s.name} (${s.domain})</option>`).join('');
}

function changeSite(val) {
  siteId = parseInt(val);
  localStorage.setItem('analytics_site_id', siteId);
  loadMarkers();
}

function loadMarkers() {
  api('/api/visitor-locations?site_id=' + siteId)
    .then(r => r.json()).then(data => {
      document.getElementById('visitorCount').textContent = data.length + ' active visitors';
      markers.clearLayers();
      data.forEach(v => {
        if (v.lat && v.lon) {
          var color = '#4e73df';
          var c = L.circleMarker([v.lat, v.lon], { radius: 8, fillColor: color, color: '#fff', weight: 2, opacity: 1, fillOpacity: .8 });
          c.bindPopup('<strong>' + (v.city || 'Unknown') + ', ' + (v.country || '') + '</strong>Page: ' + (v.page || '/') + '<br>Referrer: ' + (v.referrer || 'direct'));
          c.addTo(markers);
        }
      });
      if (data.length === 0) {
        L.circleMarker([0, 0], { radius: 1, opacity: 0 }).addTo(markers);
      }
    });
}

document.addEventListener('DOMContentLoaded', function() {
  map = L.map('map').setView([20, 0], 2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18, attribution: '&copy; OpenStreetMap' }).addTo(map);
  markers = L.layerGroup().addTo(map);
  loadSites();
  loadMarkers();
  setInterval(loadMarkers, 15000);
});
</script>
</body>
</html>
